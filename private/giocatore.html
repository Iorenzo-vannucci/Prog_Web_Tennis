<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="/script/menu.js" defer></script>
    <script src="/script/giocatore.js" defer></script>
    <title>Profilo Giocatore</title>
</head>
<body>

    <div class="profile-container">
        <div class="profile-avatar-wrapper" id="avatarContainer"></div>
        <h1 id="playerTitle">Caricamento...</h1>
        <p id="playerLevel"></p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <h2 id="statPunti">-</h2>
                <p>Punti</p>
            </div>

            <div class="stat-box">
                <h2 id="statVinte">-</h2>
                <p>Vinte</p>
            </div>
            
            <div class="stat-box">
                <h2 id="statPerse">-</h2>
                <p>Perse</p>
            </div>
        </div>

        <div class="chart-container">
            <div id="winLossChart"></div>
        </div>

        <div id="boxInserimentoRisultati" class="match-box">
            <h3>Registra Match</h3>
            <form id="matchForm">
                <div class="form-group">
                    <label for="selectAvversario">Avversario</label>
                    <select id="selectAvversario" required>
                        <option value="" disabled selected>Seleziona avversario...</option>
                    </select>
                </div>
                <div class="form-group">
                    <p>Punteggio dell'incontro</p>
                    
                    <div class="tennis-scoreboard">
                        <div class="score-row">
                            <span class="row-label">Tu</span>
                            <input type="number" id="g1_mio" class="select-game" min="0" max="7" placeholder="-" required>
                            <input type="number" id="g2_mio" class="select-game" min="0" max="7" placeholder="-" required>
                            <input type="number" id="g3_mio" class="select-game" min="0" max="7" placeholder="-">
                        </div>
                        
                        <div class="score-row">
                            <span class="row-label">Sfidante</span>
                            <input type="number" id="g1_lui" class="select-game" min="0" max="7" placeholder="-" required>
                            <input type="number" id="g2_lui" class="select-game" min="0" max="7" placeholder="-" required>
                            <input type="number" id="g3_lui" class="select-game" min="0" max="7" placeholder="-">
                        </div>
                    </div>
                    <p>Compila il 3° set solo se avete giocato il terzo set decisivo.</p>
                </div>

                <button type="submit" class="btn-salva">Salva Match</button>
                <div id="matchMsg" style="margin-top: 10px; font-weight: bold;"></div>
            </form>
        </div>

        <section class="match-box">
            <h3>Storico Partite</h3>
            <div id="listaPartite">
                <p class="text-italic">Caricamento storico...</p>
            </div>
        </section>

        <br><a href="ranking.html">← Torna al Ranking</a>
    </div>
</body>
</html>
