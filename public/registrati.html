<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <script src="script/menu.js" defer></script>
    <script src="script/registrati.js" defer></script>
    <title>Diventa Socio - Circolo Tennis</title>
</head>
<body style="background-color: #F4F2EE;">

    <nav>
        <a href="index.html"><img src="foto/logo.png" alt="Logo" class="logo"></a>
        <button class="burger" onclick="toggleMenu()">&#9776;</button>
        <ul class="menu" id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="abbonati.html">Abbonati</a></li>
            <li><a href="ranking.html">Ranking</a></li>
            <li><a href="contatti.html">Contatti</a></li>
            <li class="current"><a href="login.html" class="login_button">Login</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <h1>Diventa Socio</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="regNome">Nome</label>
                <input type="text" id="regNome" required>
            </div>
            <div class="form-group">
                <label for="regCognome">Cognome</label>
                <input type="text" id="regCognome" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="form-group">
                <label for="regGenere">Genere</label>
                <select id="regGenere" required>
                    <option value="" disabled selected>Seleziona...</option>
                    <option value="M">Maschile</option>
                    <option value="F">Femminile</option>
                </select>
            </div>
            <button type="submit" class="auth-btn">Registrati</button>
            <div id="registerMsg" class="msg"></div>
        </form>

        <p class="redirect-text">
            Hai già un account? 
            <a href="login.html">Accedi qui</a>
        </p>
    </div>

</body>
</html>
